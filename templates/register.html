{% extends "layout.html" %}
{% block content %}
<div class="form-card glass" style="max-width: 500px; margin-top: 40px;">
    <div class="accuracy-circle" style="width: 80px; height: 80px; margin: 0 auto 20px;">
        <i class="fa-solid fa-user-plus" style="font-size: 1.5rem; color: var(--primary-color);"></i>
    </div>
    <h1 class="form-title" style="margin-bottom: 10px;">Practitioner Enrollment</h1>
    <p style="color: var(--text-secondary); margin-bottom: 30px;">Create your secure account to initiate AI-assisted
        endoscopy reviews.</p>

    <form method="POST" action="">
        <div class="form-group">
            <label for="username"><i class="fa-solid fa-signature" style="margin-right: 8px;"></i> Full Name /
                Title</label>
            <input type="text" class="form-control" name="username" id="username" required
                placeholder="Dr. Jane Watson">
        </div>
        <div class="form-group">
            <label for="email"><i class="fa-solid fa-id-card" style="margin-right: 8px;"></i> Medical ID / Institutional
                Email</label>
            <input type="email" class="form-control" name="email" id="email" required placeholder="watson.j@mednet.org">
        </div>
        <div class="form-group">
            <label for="password"><i class="fa-solid fa-shield-halved" style="margin-right: 8px;"></i> Secure
                Credential</label>
            <input type="password" class="form-control" name="password" id="password" required
                placeholder="Choose a strong password">
        </div>
        <button type="submit" class="btn-primary"
            style="width: 100%; border: none; padding: 18px; cursor: pointer; font-size: 1.1rem; margin-top: 1.5rem; letter-spacing: 1px;">
            JOIN THE PLATFORM <i class="fa-solid fa-chevron-right" style="margin-left: 10px;"></i>
        </button>
    </form>

    <div class="form-footer" style="padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 25px;">
        <p>Already registered? <a href="{{ url_for('login') }}" style="font-weight: 600;">Secure Login</a></p>
    </div>
</div>
{% endblock %}
