{% extends "layout.html" %}
{% block content %}
<div class="form-card glass">
    <h1 class="form-title">Join EndoVision</h1>
    <form method="POST" action="">
        <div class="form-group">
            <label for="username">Full Name</label>
            <input type="text" class="form-control" name="username" id="username" required placeholder="Ex: John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" class="form-control" name="email" id="email" required
                placeholder="Ex: john@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" name="password" id="password" required
                placeholder="Minimum 8 characters">
        </div>
        <button type="submit" class="btn-primary"
            style="width: 100%; border: none; padding: 15px; cursor: pointer; font-size: 1.1rem; margin-top: 1rem;">Create
            Account <i class="fa-solid fa-user-plus"></i></button>
    </form>
    <div class="form-footer">
        <p>Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
    </div>
</div>
{% endblock %}
