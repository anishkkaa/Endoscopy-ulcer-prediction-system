{% extends "layout.html" %}
{% block content %}
<div class="form-card glass">
    <h1 class="form-title">Welcome Back</h1>
    <form method="POST" action="">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" class="form-control" name="email" id="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" name="password" id="password" required
                placeholder="Enter your password">
        </div>
        <button type="submit" class="btn-primary"
            style="width: 100%; border: none; padding: 15px; cursor: pointer; font-size: 1.1rem; margin-top: 1rem;">Login
            <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
    </form>
    <div class="form-footer">
        <p>Don't have an account? <a href="{{ url_for('register') }}">Create an Account</a></p>
    </div>
</div>
{% endblock %}
