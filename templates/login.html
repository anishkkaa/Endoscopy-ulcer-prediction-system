{% extends "layout.html" %}
{% block content %}
<div class="form-card glass" style="max-width: 450px; margin-top: 40px;">
    <div class="accuracy-circle" style="width: 80px; height: 80px; margin: 0 auto 20px;">
        <i class="fa-solid fa-lock-open" style="font-size: 1.5rem; color: var(--primary-color);"></i>
    </div>
    <h1 class="form-title" style="margin-bottom: 10px;">Portal Access</h1>
    <p style="color: var(--text-secondary); margin-bottom: 30px;">Authenticate to access clinical diagnostics.</p>

    <form method="POST" action="">
        <div class="form-group">
            <label for="email"><i class="fa-solid fa-envelope" style="margin-right: 8px;"></i> Institutional
                Email</label>
            <input type="email" class="form-control" name="email" id="email" required
                placeholder="dr.smith@hospital.com">
        </div>
        <div class="form-group">
            <label for="password"><i class="fa-solid fa-key" style="margin-right: 8px;"></i> Credential</label>
            <input type="password" class="form-control" name="password" id="password" required
                placeholder="••••••••••••">
        </div>
        <button type="submit" class="btn-primary"
            style="width: 100%; border: none; padding: 18px; cursor: pointer; font-size: 1.1rem; margin-top: 1.5rem; letter-spacing: 1px;">
            AUTHORIZE ACCESS <i class="fa-solid fa-shield-check" style="margin-left: 10px;"></i>
        </button>
    </form>

    <div class="form-footer" style="padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 25px;">
        <p>New Practitioner? <a href="{{ url_for('register') }}" style="font-weight: 600;">Request Credentials</a></p>
    </div>
</div>
{% endblock %}
